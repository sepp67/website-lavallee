infrastructure:
  title: Infrastructure architecture
  intro: 'A real infrastructure restructuring project: separating critical production workloads from staging, lab and migration work.'
  nodes:
  - title: Production node
    subtitle: Dell OptiPlex 3040 — critical services
    items:
    - Mail
    - Nextcloud
    - Matrix
    - Reverse proxy
  - title: Staging / Lab node
    subtitle: Dell OptiPlex 7010 — tests and automation
    items:
    - Staging apps
    - Monitoring
    - CI/CD tests
    - Migration work
  - title: Operational layer
    subtitle: Ansible, Docker, Caddy, Prometheus, Grafana, Loki, WireGuard
  steps:
  - title: Separate production and staging
    text: Move from a single overloaded host to a clearer two-node Proxmox architecture with explicit operational boundaries.
  - title: Reduce Ansible complexity
    text: 'Split heavy playbooks into smaller repositories and roles: foundation, platform services and applications.'
  - title: Migrate legacy services
    text: Replace selected YunoHost services with documented Docker stacks while preserving backups and operational visibility.
  - title: Document everything
    text: Turn runbooks, incidents, diagrams and deployment notes into public engineering documentation.
