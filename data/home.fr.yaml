  recruiter_text: Vous venez de LinkedIn ou GitHub ? Consultez mes projets, articles techniques et choix d’architecture pour comprendre comment je conçois, automatise et exploite des infrastructures Linux.
  recruiter_button: Explorer les projets
  local_title: Petites entreprises & associations
  local_text: Vous cherchez un Nextcloud, un VPN, des serveurs Linux, des sauvegardes ou des alternatives open source aux services cloud ? Je peux aider à concevoir et déployer des solutions simples, durables et bien documentées.
