infrastructure:
  title: Architecture de l’infrastructure
  intro: 'Un vrai projet de restructuration d’infrastructure : séparer les charges critiques de production du staging, du laboratoire et des travaux de migration.'
  nodes:
  - title: Nœud de production
    subtitle: Dell OptiPlex 3040 — services critiques
    items:
    - Mail
    - Nextcloud
    - Matrix
    - Reverse proxy
  - title: Nœud staging / laboratoire
    subtitle: Dell OptiPlex 7010 — tests et automatisation
    items:
    - Applications staging
    - Monitoring
    - Tests CI/CD
    - Travaux de migration
  - title: Couche opérationnelle
    subtitle: Ansible, Docker, Caddy, Prometheus, Grafana, Loki, WireGuard
  steps:
  - title: Séparer la production et le staging
    text: Passer d’un hôte unique surchargé à une architecture Proxmox plus claire sur deux nœuds, avec des frontières opérationnelles explicites.
  - title: Réduire la complexité Ansible
    text: 'Découper les gros playbooks en dépôts et rôles plus petits : fondation, services de plateforme et applications.'
  - title: Migrer les services hérités
    text: Remplacer certains services YunoHost par des stacks Docker documentées, tout en conservant les sauvegardes et la visibilité opérationnelle.
  - title: Tout documenter
    text: Transformer les runbooks, incidents, schémas et notes de déploiement en documentation technique publique.
projects:
  title: Projets
  intro: Sélection de projets d’infrastructure et d’application montrant un travail concret d’ingénierie Linux.
  cards:
  - title: Infrastructure DevOps staging / production
    text: Projet d’automatisation d’infrastructure pour déployer des applications dans des environnements séparés avec Ansible, Docker et des reverse proxies.
    items:
    - Registre des projets
    - Déploiement d’images Docker
    - Health checks
    - Cibles de monitoring
    links:
    - label: GitHub
      url: https://github.com/sepp67/devops_staging_prod_infra
      primary: false
  - title: Stack collaborative auto-hébergée
    text: Chemin de migration depuis des services basés sur YunoHost vers des déploiements Docker pour Matrix et Nextcloud.
    items:
    - Volumes persistants
    - Intégration reverse proxy
    - Sauvegardes
    - Runbooks d’exploitation
    links:
    - label: GitHub
      url: https://github.com/sepp67/ansible-role-nextcloud-stack
      primary: false
  - title: Démo de facturation électronique française
    text: Prototype d’application orientée Factur-X / PDP pour démontrer la génération structurée de factures électroniques.
    items:
    - FastAPI
    - Publication d’image Docker
    - Génération Factur-X
    - Intégration API
    links:
    - label: Démonstration
      url: https://facturier.lavallee.tech
      primary: true
    - label: GitHub
      url: https://github.com/sepp67/ansible-role-facturier_demo
